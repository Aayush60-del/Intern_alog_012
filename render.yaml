services:
  - type: web
    name: intern-alog-012
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      # Required for admin login across Vercel ↔ Render:
      # - key: FRONTEND_ORIGINS
      #   value: https://YOUR-VERCEL-APP.vercel.app
      # - key: SESSION_COOKIE_SAMESITE
      #   value: None
      # - key: SESSION_COOKIE_SECURE
      #   value: "true"
      # Set these in Render dashboard (do not commit secrets):
      # - MONGO_URI
      # - ADMIN_PASSWORD
      # - GOOGLE_PLACES_API_KEY (optional)

